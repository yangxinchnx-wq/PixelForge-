<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelForge UI Mockup</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

      :root {
        color-scheme: dark;
        --bg: #06111f;
        --panel: rgba(10, 20, 36, 0.78);
        --panel-strong: rgba(13, 24, 42, 0.92);
        --line: rgba(148, 163, 184, 0.14);
        --line-strong: rgba(148, 163, 184, 0.24);
        --text: #f8fbff;
        --muted: #8fa4bf;
        --accent: #71f2c8;
        --accent-2: #6ca7ff;
        --accent-3: #ff8bd8;
        --warn: #ffb86b;
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        --radius-xl: 30px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Manrope', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 20%, rgba(113, 242, 200, 0.18), transparent 28%),
          radial-gradient(circle at 88% 14%, rgba(108, 167, 255, 0.16), transparent 24%),
          radial-gradient(circle at 52% 88%, rgba(255, 139, 216, 0.1), transparent 26%),
          linear-gradient(180deg, #07111d 0%, #04070c 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .shell {
        width: min(1520px, 100%);
        min-height: 880px;
        border: 1px solid var(--line);
        border-radius: 36px;
        background: rgba(4, 10, 18, 0.74);
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        padding: 22px;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr) 340px;
        gap: 18px;
      }

      .sidebar,
      .workspace,
      .inspector {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: var(--radius-xl);
        backdrop-filter: blur(18px);
      }

      .sidebar {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 12px 30px rgba(108, 167, 255, 0.3);
      }

      .brand-copy small,
      .meta-label,
      .section-label,
      .mini-label,
      .pill,
      .legend {
        font-family: 'IBM Plex Mono', monospace;
        letter-spacing: 0.04em;
      }

      .brand-copy small,
      .meta-label,
      .section-label,
      .mini-label,
      .legend {
        color: var(--muted);
        font-size: 12px;
      }

      .brand-copy h1 {
        margin: 2px 0 0;
        font-size: 18px;
      }

      .nav-group {
        display: grid;
        gap: 10px;
      }

      .nav-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 14px 14px 15px;
        background: rgba(255, 255, 255, 0.02);
      }

      .nav-card.active {
        border-color: rgba(113, 242, 200, 0.28);
        background: linear-gradient(180deg, rgba(113, 242, 200, 0.1), rgba(113, 242, 200, 0.03));
      }

      .nav-card strong {
        display: block;
        margin: 6px 0 4px;
        font-size: 15px;
      }

      .nav-card span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .sidebar-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 14px;
        background: rgba(255, 255, 255, 0.02);
      }

      .chip-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: #dce8f6;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.04);
      }

      .pill.active {
        border-color: rgba(108, 167, 255, 0.32);
        background: rgba(108, 167, 255, 0.14);
      }

      .workspace {
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 16px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 8px 6px 4px;
      }

      .topbar h2 {
        margin: 4px 0 0;
        font-size: 34px;
        line-height: 1.05;
      }

      .topbar p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        max-width: 640px;
      }

      .status-cluster {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .status-badge,
      .ghost-badge {
        height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        font-family: 'IBM Plex Mono', monospace;
      }

      .status-badge {
        color: #042013;
        background: linear-gradient(135deg, var(--accent), #a8ffda);
      }

      .ghost-badge {
        border: 1px solid var(--line);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }

      .hero-card,
      .meta-card,
      .canvas-card,
      .timeline-card,
      .inspector-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel-strong);
      }

      .hero-card {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .hero-stat-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 26px;
      }

      .stat span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta-card {
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }

      .meta-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .meta-row strong {
        font-size: 14px;
      }

      .meta-row span {
        color: var(--muted);
        font-size: 13px;
      }

      .canvas-card {
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 14px;
      }

      .canvas-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .canvas-top h3,
      .timeline-card h3,
      .inspector-card h3 {
        margin: 6px 0 0;
        font-size: 18px;
      }

      .canvas-frame {
        position: relative;
        min-height: 420px;
        border-radius: 26px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background:
          radial-gradient(circle at 25% 30%, rgba(255, 255, 255, 0.12), transparent 22%),
          linear-gradient(135deg, rgba(14, 26, 42, 0.98), rgba(7, 16, 30, 0.98));
      }

      .canvas-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.08));
      }

      .shape {
        position: absolute;
        border-radius: 999px;
        filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.26));
      }

      .shape.gradient {
        inset: 52px 58px 76px 54px;
        border-radius: 34px;
        background: linear-gradient(135deg, #396dff 0%, #5db8ff 32%, #70f3c4 62%, #ffc46b 100%);
      }

      .shape.solid {
        width: 180px;
        height: 180px;
        top: 90px;
        left: 74px;
        background: #2f90ff;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
      }

      .shape.noise {
        inset: 62px 64px 94px 70px;
        border-radius: 28px;
        background:
          radial-gradient(circle at 20% 24%, rgba(255,255,255,0.12) 0 2px, transparent 2px),
          radial-gradient(circle at 62% 38%, rgba(255,255,255,0.12) 0 2px, transparent 2px),
          radial-gradient(circle at 40% 68%, rgba(255,255,255,0.1) 0 2px, transparent 2px),
          radial-gradient(circle at 78% 72%, rgba(255,255,255,0.12) 0 2px, transparent 2px),
          linear-gradient(135deg, #0c1830, #90d5ff);
        background-size: 52px 52px, 74px 74px, 66px 66px, 92px 92px, auto;
      }

      .shape.circle-bg {
        inset: 56px 60px 84px 56px;
        border-radius: 30px;
        background: linear-gradient(180deg, #0f151f, #0a0e14);
      }

      .shape.circle-core {
        width: 220px;
        height: 220px;
        top: 126px;
        left: calc(50% - 110px);
        background: radial-gradient(circle at 35% 30%, #fff0bf 0%, #ffcb57 28%, #f39a1d 100%);
      }

      .canvas-overlay {
        position: absolute;
        inset: auto 18px 18px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 18px;
        background: rgba(3, 10, 18, 0.72);
        backdrop-filter: blur(16px);
      }

      .canvas-overlay strong {
        font-size: 14px;
      }

      .canvas-overlay span {
        color: var(--muted);
        font-size: 12px;
      }

      .segmented {
        display: inline-flex;
        gap: 8px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255,255,255,0.03);
      }

      .segment {
        height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        font-family: 'IBM Plex Mono', monospace;
      }

      .segment.active {
        color: #041521;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }

      .timeline-card {
        padding: 16px 18px;
        display: grid;
        gap: 12px;
      }

      .timeline-row {
        display: grid;
        grid-template-columns: 110px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      }

      .timeline-row:last-child {
        border-bottom: 0;
      }

      .timeline-row strong {
        font-size: 14px;
      }

      .track {
        height: 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        overflow: hidden;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
      }

      .fill.a { width: 88%; background: linear-gradient(90deg, var(--accent), #56d0ff); }
      .fill.b { width: 62%; background: linear-gradient(90deg, var(--accent-2), #80c3ff); }
      .fill.c { width: 47%; background: linear-gradient(90deg, var(--accent-3), #ffc3e6); }
      .fill.d { width: 29%; background: linear-gradient(90deg, var(--warn), #ffd18a); }

      .inspector {
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto auto 1fr;
        gap: 16px;
      }

      .inspector-card {
        padding: 16px;
      }

      .inspector-grid {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .inspector-item {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        padding: 11px 12px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 14px;
        background: rgba(255,255,255,0.03);
      }

      .inspector-item span {
        color: var(--muted);
        font-size: 13px;
      }

      .inspector-item strong {
        font-size: 13px;
      }

      .patch-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .patch-btn {
        min-height: 48px;
        border-radius: 16px;
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        font
